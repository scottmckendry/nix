git:
  pagers:
    - colorArg: always
      pager: delta --paging=never
  parseEmoji: true
gui:
  border: rounded
  mouseEvents: false
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - "#5ef1ff"
    cherryPickedCommitBgColor:
      - "#3c4048"
    cherryPickedCommitFgColor:
      - "#ff5ea0"
    defaultFgColor:
      - "#ffffff"
    inactiveBorderColor:
      - "#7b8496"
    optionsTextColor:
      - "#3c4048"
    searchingActiveBorderColor:
      - "#ff5ef1ff"
    selectedLineBgColor:
      - "#3c4048"
    unstagedChangesColor:
      - "#ffbd5e"
notARepository: skip
