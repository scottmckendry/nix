background {
  color = #16181a
}

general {
  hide_cursor = true
  ignore_empty_input = true
}

input-field {
  monitor = MONITOR
  size = 250, 60
  outer_color = rgba(0, 0, 0, 0)
  inner_color = rgba(0, 0, 0, 0.2)
  font_color = rgba(200, 200, 200, 1)
}

label {
  monitor = MONITOR
  text = cmd[update:1000] echo -n $(date +'%-I:%M %p')
  size = 250, 60
  color = rgba(200, 200, 200, 1)
  font_size = 45
  font_family = Inter
  position = 0, 100
  halign = center
  valign = center
}
